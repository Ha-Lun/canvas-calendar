name: Update Canvas Calendar

on:
  schedule:
    - cron: '0 */6 * * *' # Runs automatically every 6 hours
  workflow_dispatch: # Allows you to click a button on GitHub to run it manually

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This allows the bot to save the .ics file to your repo
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
        
      - name: Run Python script
        env:
          CANVAS_URL: ${{ secrets.CANVAS_URL }}
          CANVAS_TOKEN: ${{ secrets.CANVAS_TOKEN }}
        run: python main.py
        
      - name: Commit and push the updated calendar
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add canvas_events.ics
          # If there are no new assignments, this prevents the action from crashing
          git commit -m "Auto-update calendar" || echo "No changes to commit"
          git push